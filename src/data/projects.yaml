  - title: "DevMetrics"
    subtitle: "Engineering team analytics dashboard"
    description: "Dashboard that aggregates data from GitHub, Jira, and Slack to give engineering leaders visibility into team velocity, code review bottlenecks, and deployment frequency."
    body: |
      ## Why

      "How is the team doing?" is a surprisingly hard question to answer with
      data that already exists but lives in three different tools. DevMetrics
      pulls it together into a few honest charts.

      ## Highlights

      - **One pipeline** — scheduled jobs normalize GitHub, Jira, and Slack
        events into a single time-series store.
      - **Bottleneck view** — surfaces where pull requests actually wait (review,
        CI, or merge) instead of a single vanity number.
      - **Leakproof** — read-only scopes and per-workspace isolation, because the
        data is sensitive.

      Built to be glanceable: if a chart needs a paragraph to explain, it didn't
      ship.
    icon: "oqhqyeud"
    status: "Live"
    featured: true
    links:
