  - title: "TaskFlow"
    subtitle: "Team project management reimagined"
    description: "A modern project management tool with real-time collaboration, Kanban boards, and AI-powered task prioritization. Built for small teams who want simplicity without sacrificing power."
    body: |
      ## The problem

      Small teams kept bouncing between a chat app, a spreadsheet, and a
      heavyweight project tool that nobody enjoyed opening. TaskFlow started as a
      weekend prototype to see how much of that could collapse into one fast,
      real-time board.

      ## How it works

      - **Real-time boards** — every change syncs over a websocket, so a card
        moved on one screen slides on everyone else's instantly.
      - **AI prioritization** — an optional pass ranks the backlog from due dates,
        dependencies, and past velocity, then explains *why* in a sentence.
      - **Keyboard-first** — the whole board is drivable without a mouse.

      ## What I learned

      Optimistic UI is the difference between "fine" and "fast". Rendering the
      move immediately and reconciling on the server response made the tool feel
      native, even on a flaky connection.
    icon: "lvrxlmju"
    status: "Live"
    featured: true
